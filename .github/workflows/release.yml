name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.1.0
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: aliyun-tools-linux-x86_64
          - target: x86_64-unknown-linux-musl
            asset: aliyun-tools-linux-x86_64-musl
          - target: aarch64-unknown-linux-gnu
            asset: aliyun-tools-linux-aarch64
          - target: aarch64-unknown-linux-musl
            asset: aliyun-tools-linux-aarch64-musl

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event_name == 'release' && github.event.release.tag_name || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - run: cargo test --locked
      - run: cross build --release --locked --target ${{ matrix.target }}
      - name: Smoke test Alpine compatibility
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: docker run --rm -v "$PWD/target/${{ matrix.target }}/release:/work:ro" alpine:3.20 /work/aliyun-tools --help >/dev/null
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/aliyun-tools dist/
          tar -C dist -czf dist/${{ matrix.asset }}.tar.gz aliyun-tools
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}.tar.gz

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
